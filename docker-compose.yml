services:
  whisperflow-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whisperflow-server
    ports:
      - "8181:8181"
    environment:
      - PORT=8181
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8181/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
